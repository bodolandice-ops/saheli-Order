<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fdfaf7; padding: 15px; font-family: sans-serif; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn-submit { background-color: #d63384; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: #555; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="form-card">
    <h4 class="text-center mb-4" style="color:#d63384;">SAHELI REGISTRATION</h4>
    <form id="shippingForm">
        <label>FULL NAME</label>
        <input type="text" name="customerName" class="form-control" required>

        <div class="row">
            <div class="col-6"><label>PHONE 1</label><input type="tel" name="phone1" class="form-control" pattern="[0-9]{10}" required></div>
            <div class="col-6"><label>PHONE 2</label><input type="tel" name="phone2" class="form-control" pattern="[0-9]{10}" required></div>
        </div>

        <label>ADDRESS / LANDMARK</label>
        <input type="text" name="address" class="form-control" required>

        <div class="row">
            <div class="col-6"><label>VILL / TOWN</label><input type="text" name="villTown" class="form-control" required></div>
            <div class="col-6"><label>POST OFFICE</label><input type="text" name="postOffice" class="form-control" required></div>
        </div>

        <div class="row">
            <div class="col-6"><label>POLICE STATION</label><input type="text" name="policeStation" class="form-control" required></div>
            <div class="col-6"><label>DISTRICT</label><input type="text" name="district" class="form-control" required></div>
        </div>

        <div class="row">
            <div class="col-6"><label>STATE</label><input type="text" name="state" class="form-control" value="Assam" required></div>
            <div class="col-6"><label>PIN CODE</label><input type="tel" name="pin" class="form-control" pattern="[0-9]{6}" required></div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-submit">SAVE & GENERATE LABEL</button>
    </form>
    <div id="status" class="mt-3 text-center fw-bold"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw59TxOnvlr1BCPWtswHv8Txm0i4AzU8fW4wsW8vymaq3vReQ5YyJfgPEusvqaga4HrBw/exec"; // PASTE NEW URL HERE

    document.getElementById('shippingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerHTML = "SAVING...";

        const formData = new FormData(this);
        const params = new URLSearchParams(formData).toString();

        // Using 'no-cors' mode is the trick to stop the Connection Error 
        // while still sending the data to Google.
        fetch(SCRIPT_URL + "?" + params, {
            method: 'POST',
            mode: 'no-cors'
        })
        .then(() => {
            status.style.color = "green";
            status.innerHTML = "✅ SUBMITTED SUCCESSFULLY!";
            this.reset();
        })
        .catch(err => {
            status.style.color = "red";
            status.innerHTML = "❌ SYSTEM BUSY - CHECK DRIVE";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = "SAVE & GENERATE LABEL";
        });
    });
</script>

</body>
</html>
