<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWRKHI Customer Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fcfaf8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px 10px; }
        .app-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 500px; margin: auto; border-top: 6px solid #d63384; }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-title { color: #d63384; font-weight: 800; font-size: 1.8rem; letter-spacing: 2px; }
        .brand-sub { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 0.75rem; font-weight: bold; color: #555; text-transform: uppercase; margin-top: 12px; }
        .form-control { border-radius: 8px; padding: 12px; border: 1px solid #ddd; font-size: 1rem; }
        .form-control:focus { border-color: #d63384; box-shadow: 0 0 0 0.2rem rgba(214, 51, 132, 0.1); }
        .btn-primary { background-color: #d63384; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; width: 100%; margin-top: 25px; }
        .btn-primary:disabled { background-color: #e9ecef; color: #999; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand-header">
        <div class="brand-title">SWRKHI</div>
        <div class="brand-sub">Handloom & Rural Weavers</div>
    </div>
    
    <form id="swrkhiForm">
        <label>Customer Full Name</label>
        <input type="text" name="customerName" class="form-control" placeholder="Required" required>

        <div class="row">
            <div class="col-6">
                <label>Phone 1 (Required)</label>
                <input type="tel" name="phone1" class="form-control" pattern="[0-9]{10}" placeholder="10 Digits" required>
            </div>
            <div class="col-6">
                <label>Phone 2 (Required)</label>
                <input type="tel" name="phone2" class="form-control" pattern="[0-9]{10}" placeholder="10 Digits" required>
            </div>
        </div>

        <label>House No / Street / Landmark</label>
        <input type="text" name="address" class="form-control" placeholder="Full address details" required>

        <div class="row">
            <div class="col-6">
                <label>Vill / Town</label>
                <input type="text" name="villTown" class="form-control" required>
            </div>
            <div class="col-6">
                <label>Post Office</label>
                <input type="text" name="postOffice" class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <label>Police Station</label>
                <input type="text" name="policeStation" class="form-control" required>
            </div>
            <div class="col-6">
                <label>District</label>
                <input type="text" name="district" class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <label>State</label>
                <input type="text" name="state" class="form-control" value="Assam" required>
            </div>
            <div class="col-6">
                <label>PIN Code</label>
                <input type="tel" name="pin" class="form-control" pattern="[0-9]{6}" placeholder="6 Digits" required>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary">SAVE & GENERATE PDF</button>
    </form>
    <div id="responseMessage" class="mt-4 text-center fw-bold small"></div>
</div>

<script>
    // PASTE YOUR NEW WEB APP URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2HU3siOHtDiJlyCr6pVpGIF4wd6lISKDn05SQTZo5_F10rmWGYJHJT99kHezIcW3r/exec";

    document.getElementById('swrkhiForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('responseMessage');
        
        btn.disabled = true;
        btn.innerHTML = "PROCESSING...";

        const data = new FormData(this);
        const params = new URLSearchParams(data);

        fetch(SCRIPT_URL + "?" + params.toString(), { method: 'POST' })
        .then(res => {
            status.style.color = "green";
            status.innerHTML = "✅ SUCCESS: Order Registered & PDF Created!";
            this.reset();
        })
        .catch(err => {
            status.style.color = "red";
            status.innerHTML = "❌ CONNECTION ERROR: Please try again.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = "SAVE & GENERATE PDF";
        });
    });
</script>

</body>
</html>
