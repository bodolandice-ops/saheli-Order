<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHELI Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fdfaf7; font-family: sans-serif; padding: 15px; }
        .app-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 480px; margin: auto; border-top: 6px solid #d63384; }
        .brand-name { text-align: center; color: #d63384; font-weight: bold; font-size: 1.5rem; margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: bold; color: #555; margin-top: 10px; display: block; text-transform: uppercase; }
        .form-control { border-radius: 8px; border: 1px solid #ddd; }
        .btn-submit { background-color: #d63384; color: white; width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand-name">SWRKHI HANDLOOM</div>
    <form id="shippingForm">
        <label>Full Name</label>
        <input type="text" name="customerName" class="form-control" placeholder="Required" required>

        <div class="row">
            <div class="col-6"><label>Phone 1</label><input type="tel" name="phone1" class="form-control" pattern="[0-9]{10}" placeholder="10 Digits" required></div>
            <div class="col-6"><label>Phone 2</label><input type="tel" name="phone2" class="form-control" pattern="[0-9]{10}" placeholder="10 Digits" required></div>
        </div>

        <label>Address / Landmark</label>
        <input type="text" name="address" class="form-control" required>

        <div class="row">
            <div class="col-6"><label>Vill / Town</label><input type="text" name="villTown" class="form-control" required></div>
            <div class="col-6"><label>Post Office</label><input type="text" name="postOffice" class="form-control" required></div>
        </div>

        <div class="row">
            <div class="col-6"><label>Police Station</label><input type="text" name="policeStation" class="form-control" required></div>
            <div class="col-6"><label>District</label><input type="text" name="district" class="form-control" required></div>
        </div>

        <div class="row">
            <div class="col-6"><label>State</label><input type="text" name="state" class="form-control" value="Assam" required></div>
            <div class="col-6"><label>PIN Code</label><input type="tel" name="pin" class="form-control" pattern="[0-9]{6}" placeholder="6 Digits" required></div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-submit">SAVE & GENERATE LABEL</button>
    </form>
    <div id="status" class="mt-3 text-center fw-bold small"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwspYXBl432XuvfHXbq2VgOoTiAmhjLJSX5u-wlHAb64QQkt7RrrlHTy8Guvk5NPy0dEQ/exec"; // PASTE NEW DEPLOYMENT URL HERE

    document.getElementById('shippingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.innerHTML = "GENERATING PDF...";

        const formData = new FormData(this);
        const params = new URLSearchParams(formData);

        fetch(API_URL + "?" + params.toString(), { method: 'POST' })
        .then(() => {
            status.style.color = "green";
            status.innerHTML = "✅ SUCCESS! Saved to Sheet and Folder.";
            this.reset();
        })
        .catch(() => {
            status.style.color = "red";
            status.innerHTML = "❌ CONNECTION ERROR.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = "SAVE & GENERATE LABEL";
        });
    });
</script>

</body>
</html>
