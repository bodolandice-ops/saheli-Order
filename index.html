<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Shipping Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fcfaf8; font-family: 'Segoe UI', sans-serif; padding-top: 20px; }
        .form-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 450px; margin: auto; border: 1px solid #eee; }
        .header { text-align: center; border-bottom: 2px solid #d63384; margin-bottom: 25px; padding-bottom: 10px; color: #333; font-weight: bold; }
        .btn-submit { background-color: #d63384; color: white; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1.1rem; transition: 0.3s; }
        .btn-submit:disabled { background-color: #ccc; }
        label { font-size: 0.8rem; font-weight: 600; color: #777; margin-top: 10px; }
        .form-control { border-radius: 10px; padding: 10px; background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header">CUSTOMER REGISTRATION</div>
        <form id="shippingForm">
            <label>FULL NAME</label>
            <input type="text" name="customerName" class="form-control" placeholder="Enter name" required>

            <label>HOUSE NO / STREET</label>
            <input type="text" name="address" class="form-control" placeholder="Detailed address" required>

            <div class="row">
                <div class="col-6">
                    <label>VILL / TOWN</label>
                    <input type="text" name="villTown" class="form-control" required>
                </div>
                <div class="col-6">
                    <label>POST OFFICE</label>
                    <input type="text" name="postOffice" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label>POLICE STATION</label>
                    <input type="text" name="policeStation" class="form-control" required>
                </div>
                <div class="col-6">
                    <label>DISTRICT</label>
                    <input type="text" name="district" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label>STATE</label>
                    <input type="text" name="state" class="form-control" value="Assam" required>
                </div>
                <div class="col-6">
                    <label>PIN CODE</label>
                    <input type="number" name="pin" class="form-control" required>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-submit mt-4">Generate Label</button>
        </form>
        <div id="status" class="mt-3 text-center fw-bold"></div>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE WEB APP URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbxpr68OHLFkJ0Ht4feGVnQ3DwOP3zHSvg_IqD2b_bzfAAXPERJ2GamxbSZi6kTLyaKU6Q/exec";

    document.getElementById('shippingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerHTML = "Saving Details...";

        const formData = new FormData(this);
        const params = new URLSearchParams(formData);

        // Sending data as a POST request to Google
        fetch(API_URL + "?" + params.toString(), {
            method: 'POST'
        })
        .then(response => {
            status.style.color = "green";
            status.innerHTML = "✅ Saved! PDF is in your Drive.";
            this.reset();
        })
        .catch(error => {
            status.style.color = "red";
            status.innerHTML = "❌ Error connecting to Sheet.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = "Generate Label";
        });
    });
</script>

</body>
</html>
